<!DOCTYPE html>
<html>
<head>
<title>Expenses</title>
<style>

body{
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
font-family:'Segoe UI';
}

nav{
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(0,0,0,0.5);
border-bottom:1px solid rgba(167,139,250,0.2);
}

nav a{
color:#c4b5fd;
text-decoration:none;
margin-left:20px;
}

.container{
margin:40px;
background:rgba(167,139,250,0.08);
padding:30px;
border-radius:15px;
backdrop-filter:blur(10px);
border:1px solid rgba(167,139,250,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
background:rgba(255,255,255,0.08);
border:1px solid rgba(167,139,250,0.3);
border-radius:8px;
color:white;
}

button{
width:100%;
padding:10px;
background:linear-gradient(135deg,#f87171,#ef4444);
border:none;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:linear-gradient(135deg,#f59e0b,#d97706);
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:linear-gradient(135deg,#7c3aed,#a78bfa);
color:white;
}

.expense{
color:#f87171;
font-weight:bold;
}

</style>
</head>
<body>

<nav>
<h2>💸 Expenses</h2>
<div>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="income.html">Income</a>
</div>
</nav>

<div class="container">

<h2>Total Expense: ₹ <span id="totalExpense">0</span></h2>

<h3>Add Expense</h3>
<input type="number" id="amount" placeholder="Amount">
<select id="category" style="width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid rgba(167,139,250,0.3);font-family:'Segoe UI',sans-serif;font-size:14px;background:rgba(255,255,255,0.08);color:white;">
<option value="">-- Select Category --</option>
<option value="Groceries">Groceries</option>
<option value="Vehicle Services">Vehicle Services</option>
<option value="Home Rent">Home Rent</option>
<option value="Entertainment">Entertainment</option>
<option value="Other">Other</option>
</select>
<div id="limitStatus" style="margin:5px 0 10px;padding:10px;border-radius:8px;display:none;font-size:14px;"></div>
<input type="date" id="date">
<input type="text" id="description" placeholder="Description">
<button onclick="addExpense()">Add Expense</button>

<table id="expenseTable">
<tr>
<th>Amount</th>
<th>Category</th>
<th>Date</th>
<th>Description</th>
</tr>
</table>

</div>

<script>

let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let table = document.getElementById("expenseTable");

// Limit key map matching dashboard
const limitKeys = {
    "Groceries": "limitGroceries",
    "Vehicle Services": "limitVehicle",
    "Home Rent": "limitRent",
    "Entertainment": "limitEntertainment",
    "Other": "limitOther"
};

// Show limit status when category is selected
document.getElementById("category").addEventListener("change", function(){
    checkLimitStatus(this.value);
});

function checkLimitStatus(category){
    let statusBox = document.getElementById("limitStatus");
    if(!category){ statusBox.style.display = "none"; return; }

    let limitKey = limitKeys[category];
    let limit = parseFloat(localStorage.getItem(limitKey)) || 0;

    // Calculate already spent in this category
    let alreadySpent = 0;
    transactions.forEach(t => {
        if(t.type === "expense" && t.category === category){
            alreadySpent += t.amount;
        }
    });

    if(limit === 0){
        statusBox.style.display = "block";
        statusBox.style.background = "rgba(167,139,250,0.1)";
        statusBox.style.color = "#c4b5fd";
        statusBox.innerHTML = "ℹ️ No limit set for <b>" + category + "</b>. Spent so far: ₹" + alreadySpent;
    } else {
        let remaining = limit - alreadySpent;
        if(remaining <= 0){
            statusBox.style.display = "block";
            statusBox.style.background = "rgba(248,113,113,0.2)";
            statusBox.style.color = "#f87171";
            statusBox.innerHTML = "🚫 Limit exceeded for <b>" + category + "</b>! Limit: ₹" + limit + " | Spent: ₹" + alreadySpent;
        } else {
            statusBox.style.display = "block";
            statusBox.style.background = "rgba(16,185,129,0.15)";
            statusBox.style.color = "#10b981";
            statusBox.innerHTML = "✅ <b>" + category + "</b> — Limit: ₹" + limit + " | Spent: ₹" + alreadySpent + " | Remaining: ₹" + remaining;
        }
    }
}

function addExpense(){
let amount = parseFloat(document.getElementById("amount").value);
let category = document.getElementById("category").value;
let date = document.getElementById("date").value;
let description = document.getElementById("description").value;

if(!amount || !category || !date){
    alert("Please fill in Amount, Category, and Date.");
    return;
}

// Check limit before adding
let limitKey = limitKeys[category];
let limit = parseFloat(localStorage.getItem(limitKey)) || 0;
if(limit > 0){
    let alreadySpent = 0;
    transactions.forEach(t => {
        if(t.type === "expense" && t.category === category){
            alreadySpent += t.amount;
        }
    });
    if(alreadySpent + amount > limit){
        let over = (alreadySpent + amount) - limit;
        let proceed = confirm(
            "⚠️ Warning: Adding ₹" + amount + " to " + category +
            " will exceed your limit by ₹" + over + "!\n" +
            "Limit: ₹" + limit + " | Already Spent: ₹" + alreadySpent + "\n\n" +
            "Do you want to proceed anyway?"
        );
        if(!proceed) return;
    }
}

let transaction = {
amount,
type:"expense",
category,
date,
description
};

transactions.push(transaction);
localStorage.setItem("transactions", JSON.stringify(transactions));
location.reload();
}

let totalExpense = 0;

transactions.forEach(t=>{
if(t.type==="expense"){
totalExpense += t.amount;

let row = table.insertRow();
row.innerHTML = `
<td class="expense">₹ ${t.amount}</td>
<td>${t.category}</td>
<td>${t.date}</td>
<td>${t.description}</td>
`;
}
});

document.getElementById("totalExpense").innerText = totalExpense;

</script>

</body>
</html>
